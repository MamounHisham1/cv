<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Template Preview — SeratyAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #09090b; font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .hero { text-align: center; padding: 60px 20px 40px; }
        .hero .logo { width: 48px; height: 48px; border-radius: 12px; margin-bottom: 16px; }
        .hero h1 { color: #fafafa; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
        .hero p { color: #71717a; font-size: 15px; max-width: 480px; margin: 0 auto; line-height: 1.5; }
        .templates { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding: 0 24px 60px; max-width: 1100px; width: 100%; }
        .tpl-card { background: #18181b; border: 1px solid #27272a; border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.2s, border-color 0.2s; text-decoration: none; }
        .tpl-card:hover { transform: translateY(-4px); border-color: #10b981; }
        .tpl-card iframe { width: 100%; height: 600px; border: none; pointer-events: none; }
        .tpl-label { padding: 16px 20px 12px; border-bottom: 1px solid #27272a; display: flex; align-items: center; gap: 8px; }
        .tpl-label .dot { width: 8px; height: 8px; border-radius: 50%; }
        .tpl-label span { color: #a1a1aa; font-size: 13px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="hero">
        <img class="logo" src="https://localhost:8000/favicon.svg" alt="SeratyAI">
        <h1>Email Templates</h1>
        <p>Choose a template for your admin emails. Click any card to preview it.</p>
    </div>
    <div class="templates">
        <a class="tpl-card" href="template-announcement.html">
            <div class="tpl-label">
                <div class="dot" style="background: #10b981;"></div>
                <span>Announcement</span>
            </div>
            <iframe src="template-announcement.html" loading="lazy"></iframe>
        </a>
        <a class="tpl-card" href="template-notice.html">
            <div class="tpl-label">
                <div class="dot" style="background: #f59e0b;"></div>
                <span>Notice</span>
            </div>
            <iframe src="template-notice.html" loading="lazy"></iframe>
        </a>
        <a class="tpl-card" href="template-update.html">
            <div class="tpl-label">
                <div class="dot" style="background: #065f46;"></div>
                <span>Update</span>
            </div>
            <iframe src="template-update.html" loading="lazy"></iframe>
        </a>
    </div>
</body>
</html>
